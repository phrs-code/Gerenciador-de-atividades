<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>
<body>
    <section class="tasks">
        <div class="filters">
            <div class="btn-filters">
                <button class="btn btn-primary" data-filter="all">Todas</button>
                <button class="btn btn-primary" data-filter="pending">Pendentes</button>
                <button class="btn btn-primary" data-filter="completed">Concluídas</button>
            </div>

            <input type="text" id="search" placeholder="Pesquisar tarefas..." aria-label="Pesquisar tarefas" />
        </div>

        <div class="tasks-header">
            <h2>Minhas tarefas</h2>
            <button class="btn btn-primary" id="new-task">+ Nova tarefa</button>
        </div>

        <ul class="task-list" id="task-list" aria-live="polite">
            <!-- preenchido por JS -->
        </ul>

        <div class="empty-state" id="empty" hidden>
            <p>Você ainda não criou tarefas.</p>
            <button class="btn btn-primary">Criar primeira tarefa</button>
        </div>
    </section>

    <script type="module" src="js/tasks.js" defer></script>
    <script type="module" src="js/app.js" defer></script>
</body>
</html>
