<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Atividades</title>
    
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
</head>
<body>
    <main class="auth">
        <form class="auth-card" id="login-form" novalidate>
            <div class="auth-logo">IP</div>
            <h1>Entrar</h1>
            <p class="auth-sub">Gerenciador de atividades</p>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required
                autocomplete="email" placeholder="voce@email.com" />
            <span class="field-error" id="email-error"></span>

            <label for="password">Senha</label>
            <input id="password" name="password" type="password" required
           autocomplete="current-password" minlength="6" />
            <span class="field-error" id="password-error"></span>

            <button type="submit" class="btn btn-primary">Entrar</button>
            <p class="auth-link">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </main>

    <script type="module" src="js/app.js" defer></script>
</body>
</html>
